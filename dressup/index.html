<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>換裝遊戲</title>
  <meta name="color-scheme" content="dark" />

  <link rel="stylesheet" href="./dressup.css" />
  <script src="./dressup.js" defer></script>
<meta property="og:image" content="https://screenshot.cosine.page?url=https://2wn1ge74q0t8.cosine.page"><script src="https://cosine.sh/preview/script.js"></script></head>
<body class="dressup-root">
  <div class="dressup-container">
    <div class="dressup-layout" id="dressup-app">
      <!-- 左：模特兒（正 / 背面） -->
      <aside class="dressup-sidebar dressup-card" aria-label="模特兒">
        <div class="dressup-card-header">
          <h1 class="dressup-title">換裝遊戲</h1>
          <p class="dressup-subtitle">左側切換正面 / 背面；右側選擇衣物與飾品。</p>
        </div>

        <div class="dressup-card-body">
          <div id="dressup-stage" class="dressup-stage" aria-label="模特兒舞台"></div>

          <div class="dressup-section">
            <div class="dressup-sidebar-actions">
              <button id="dressup-view-front" class="dressup-btn dressup-btn-primary" type="button" aria-pressed="true">正面</button>
              <button id="dressup-view-back" class="dressup-btn" type="button" aria-pressed="false">背面</button>
              <button id="dressup-reset" class="dressup-btn" type="button">Reset 全部</button>
            </div>
            <p id="dressup-error" class="dressup-subtitle" role="status"></p>
          </div>
        </div>
      </aside>

      <!-- 右：衣櫃 -->
      <main class="dressup-main dressup-card" aria-label="衣櫃">
        <div class="dressup-card-header">
          <h2 class="dressup-title">衣櫃</h2>
          <p class="dressup-subtitle">點一下穿上 / 更換；再點一次脫下。</p>
        </div>

        <div class="dressup-card-body">
          <div id="dressup-tabs" class="dressup-tabs" role="tablist" aria-label="衣櫃分類"></div>

          <section id="dressup-slot-section" class="dressup-section dressup-hidden" aria-label="飾品分類">
            <div class="dressup-section-header">
              <div>
                <h3 class="dressup-section-title">飾品分類（slot）</h3>
                <p class="dressup-section-hint">同 slot 互斥，不同 slot 可同時選。</p>
              </div>
            </div>
            <div id="dressup-slot-tabs" class="dressup-tabs" role="tablist" aria-label="飾品 slot"></div>
          </section>

          <section class="dressup-section" aria-label="物品清單">
            <div class="dressup-section-header">
              <div>
                <h3 id="dressup-grid-title" class="dressup-section-title">物品</h3>
                <p id="dressup-grid-hint" class="dressup-section-hint"></p>
              </div>
            </div>
            <div id="dressup-grid" class="dressup-grid"></div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <noscript>
    <div style="max-width: 720px; margin: 16px auto; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(0,0,0,0.12); color: white;">
      需要啟用 JavaScript 才能使用換裝功能。
    </div>
  </noscript>
</body>
</html>
